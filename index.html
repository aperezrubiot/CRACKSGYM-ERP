<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRACKSGYM ERP</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!--
    index.html no tiene interfaz propia: es solo un punto de entrada.
    Su única responsabilidad es decidir a dónde mandar al usuario según
    si hay una sesión activa y válida (ver auth.js).
  -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    window.location.replace(sesionValida() ? 'dashboard.html' : 'login.html');
  </script>

  <noscript>
    <p style="color:#F5F5F4; background:#0A0A0B; padding:24px; font-family:sans-serif;">
      CRACKSGYM ERP requiere JavaScript habilitado.
      <a href="login.html" style="color:#86FF00;">Ir a la pantalla de acceso</a>.
    </p>
  </noscript>
</body>
</html>
