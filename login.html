<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRACKSGYM ERP — Iniciar sesión</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Estilos exclusivos de la pantalla de login.
       No van en main.css porque no son tokens ni componentes reutilizables. */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: var(--space-6);
    }

    /* Resplandor verde ambiental, muy sutil, en la esquina superior */
    .login-screen::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(134, 255, 0, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .login-brand {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: var(--space-10);
    }

    .login-brand .brand-icon {
      height: 44px;
      width: auto;
      margin-bottom: var(--space-4);
    }

    .login-brand .wordmark {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      letter-spacing: -0.02em;
      color: var(--color-text-primary);
    }

    .login-brand .wordmark span {
      font-weight: var(--weight-medium);
      opacity: 0.85;
    }

    .login-brand .tagline {
      margin-top: var(--space-2);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
    }

    .form-error {
      display: none;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: var(--color-danger-dim);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: var(--radius-md);
      color: var(--color-danger);
      font-size: var(--text-sm);
    }

    .form-error.visible {
      display: flex;
    }

    .login-meta {
      margin-top: var(--space-10);
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>

  <main class="login-screen">
    <div class="login-card animate-fade-up">

      <div class="login-brand accent-stripe">
        <img src="assets/logo/isotipo.png" alt="CRACKS GYM" class="brand-icon">
        <span class="wordmark">CRACKS<span>GYM</span></span>
        <span class="tagline">Break Your Limits — ERP</span>
      </div>

      <form class="login-form" id="loginForm" novalidate>

        <div class="form-error" id="loginError">
          <span>Correo o contraseña incorrectos. Intenta de nuevo.</span>
        </div>

        <div class="field">
          <label class="field-label" for="email">Correo</label>
          <input class="input" type="email" id="email" name="email" placeholder="tu@cracksgym.com" autocomplete="username" required>
        </div>

        <div class="field">
          <label class="field-label" for="password">Contraseña</label>
          <input class="input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginSubmit">
          Iniciar sesión
        </button>

        <div class="form-footer">
          <span>¿Problemas para entrar?</span>
          <a href="#" class="text-accent">Contactar a soporte</a>
        </div>

      </form>

      <p class="login-meta">CRACKSGYM ERP · Acceso restringido a personal autorizado</p>
    </div>
  </main>

  <!-- Orden importa: config -> api -> utils -> auth -> app (app depende de los anteriores) -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
